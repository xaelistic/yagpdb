version: '3.8'

volumes:
  db:
  redis:

networks:
  default:

services:
  app:
    build:
      context: ../
      dockerfile: yagpdb_docker/Dockerfile
    command: ["sh", "-c", "echo '=== ENV CHECK ===' && env | grep YAGPDB && echo '=== DONE ===' && sleep 30"]
    depends_on:
      - redis
      - db
    networks:
      - default
    env_file:
      - app.env

  redis:
    image: docker.io/redis
    restart: unless-stopped
    networks:
      - default
    volumes:
      - redis:/data

  db:
    image: docker.io/postgres:17
    restart: unless-stopped
    volumes:
      - db:/var/lib/postgresql/data
    networks:
      - default
    env_file:
      - db.env
