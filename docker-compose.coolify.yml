services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      - "-all"
      - "-pa"
      - "-exthttps=false"
      - "-https=true"
    depends_on:
      - redis
      - db
    volumes:
      - cert_cache:/app/cert
      - soundboard:/app/soundboard
    ports:
      - '8080:80'
      - '8443:443'

  redis:
    image: docker.io/redis
    restart: unless-stopped
    volumes:
      - redis:/data

  db:
    image: docker.io/postgres:17
    restart: unless-stopped
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db:
  redis:
  cert_cache:
  soundboard:
